apiVersion: v1
kind: Namespace
metadata:
  name: ebpf-nodeport-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ebpf-nodeport-agent
  namespace: ebpf-nodeport-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ebpf-nodeport-agent
rules:
  - apiGroups: [""]
    resources: ["services", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ebpf-nodeport-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ebpf-nodeport-agent
subjects:
  - kind: ServiceAccount
    name: ebpf-nodeport-agent
    namespace: ebpf-nodeport-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ebpf-nodeport-agent-config
  namespace: ebpf-nodeport-system
data:
  NODEPORT_ATTACH_IFACE: ""
  NODEPORT_INNER_IFACES: ""
  NODEPORT_EXTERNAL_IFACE: ""
  NODEPORT_LOCAL_DELIVERY_IFACE: ""
  NODEPORT_REMOTE_DELIVERY_IFACE: ""
  NODEPORT_ROUTING_MODE: ""
  NODEPORT_ATTACH_VETHS: "0"
  NODEPORT_VETH_GLOB: "veth*"
  NODEPORT_SET_ACCEPT_LOCAL: "1"
  NODEPORT_SNAT_IFACE: "cni0"
  NODEPORT_SNAT_IP: ""
  NODEPORT_SERVICE_SELECTOR: ""
  NODEPORT_SYNC_MODE: "watch"
  NODEPORT_SYNC_POLL_INTERVAL: "5"
  NODEPORT_CT_ENTRY_TIMEOUT: "10m"
  NODEPORT_CT_GC_INTERVAL: "30s"
  NODEPORT_TELEMETRY_ENABLE: "0"
  NODEPORT_TELEMETRY_WINDOW: "1s"
  NODEPORT_TELEMETRY_FORMAT: "csv"
  NODEPORT_TELEMETRY_OUTPUT: "/var/log/ebpf-nodeport/telemetry"
  NODEPORT_TELEMETRY_EXPERIMENT_ID: "default"
  NODEPORT_TELEMETRY_EVENTS_FILE: ""
  NODEPORT_TELEMETRY_SERVICE: ""
  NODEPORT_EXTRA_ARGS: ""
  BPF_CFLAGS: ""
  PRE_CLEANUP: "1"
  CLEANUP_ON_EXIT: "1"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpf-nodeport-agent
  namespace: ebpf-nodeport-system
spec:
  selector:
    matchLabels:
      app: ebpf-nodeport-agent
  template:
    metadata:
      labels:
        app: ebpf-nodeport-agent
    spec:
      serviceAccountName: ebpf-nodeport-agent
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - k8s-worker1
                      - k8s-worker2
      terminationGracePeriodSeconds: 20
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: docker.io/library/ebpf-nodeport-agent:phase2-local
          imagePullPolicy: IfNotPresent
          command:
            - /workspace/bin/nodeport-agent
          envFrom:
            - configMapRef:
                name: ebpf-nodeport-agent-config
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: agent-bin
              mountPath: /workspace/bin
            - name: bpffs
              mountPath: /sys/fs/bpf
              mountPropagation: Bidirectional
            - name: telemetry-output
              mountPath: /var/log/ebpf-nodeport
      volumes:
        - name: agent-bin
          hostPath:
            path: /opt/ebpf-nodeport/bin
            type: DirectoryOrCreate
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: telemetry-output
          hostPath:
            path: /var/log/ebpf-nodeport
            type: DirectoryOrCreate
