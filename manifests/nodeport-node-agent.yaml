apiVersion: v1
kind: Namespace
metadata:
  name: ebpf-nodeport-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ebpf-nodeport-agent
  namespace: ebpf-nodeport-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ebpf-nodeport-agent
rules:
  - apiGroups: [""]
    resources: ["services", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ebpf-nodeport-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ebpf-nodeport-agent
subjects:
  - kind: ServiceAccount
    name: ebpf-nodeport-agent
    namespace: ebpf-nodeport-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ebpf-nodeport-agent-config
  namespace: ebpf-nodeport-system
data:
  NODEPORT_ATTACH_IFACE: "enp1s0"
  NODEPORT_INNER_IFACES: "cni0,flannel.1"
  NODEPORT_ATTACH_VETHS: "0"
  NODEPORT_VETH_GLOB: "veth*"
  NODEPORT_SET_ACCEPT_LOCAL: "1"
  NODEPORT_SNAT_IFACE: "cni0"
  NODEPORT_SNAT_IP: ""
  NODEPORT_SERVICE_SELECTOR: "ebpf-nodeport-test/nodeport-echo"
  NODEPORT_SYNC_MODE: "poll"
  NODEPORT_SYNC_POLL_INTERVAL: "5"
  NODEPORT_EXTRA_ARGS: ""
  BPF_CFLAGS: ""
  PRE_CLEANUP: "1"
  CLEANUP_ON_EXIT: "1"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpf-nodeport-agent
  namespace: ebpf-nodeport-system
spec:
  selector:
    matchLabels:
      app: ebpf-nodeport-agent
  template:
    metadata:
      labels:
        app: ebpf-nodeport-agent
    spec:
      serviceAccountName: ebpf-nodeport-agent
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 20
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: docker.io/library/ebpf-nodeport-agent:snat-v1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - /workspace/scripts/run_nodeport_agent.sh
          envFrom:
            - configMapRef:
                name: ebpf-nodeport-agent-config
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: bpffs
              mountPath: /sys/fs/bpf
              mountPropagation: Bidirectional
      volumes:
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
