apiVersion: v1
kind: Namespace
metadata:
  name: ebpf-nodeport-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeport-echo
  namespace: ebpf-nodeport-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodeport-echo
  template:
    metadata:
      labels:
        app: nodeport-echo
    spec:
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: nodeport-echo
                topologyKey: kubernetes.io/hostname
      containers:
        - name: echo
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command:
            - /bin/sh
            - -c
          args:
            - |
              mkdir -p /www
              printf '%s\n' "${POD_NAME}" > /www/index.html
              exec httpd -f -p 8080 -h /www
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 2
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nodeport-echo
  namespace: ebpf-nodeport-test
spec:
  type: NodePort
  externalTrafficPolicy: Cluster
  selector:
    app: nodeport-echo
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
