<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="640" viewBox="0 0 1080 640">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .section { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .label { font: 13px Arial, sans-serif; fill: #0f172a; }
      .small { font: 12px Arial, sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 1.6; rx: 8; }
      .blue { fill: #e0f2fe; stroke: #0369a1; }
      .green { fill: #dcfce7; stroke: #15803d; }
      .amber { fill: #fef3c7; stroke: #b45309; }
      .violet { fill: #ede9fe; stroke: #6d28d9; }
      .gray { fill: #f8fafc; stroke: #475569; }
      .line { stroke: #334155; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 6 5; }
    </style>
  </defs>

  <rect x="18" y="18" width="1044" height="604" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="540" y="52" text-anchor="middle" class="title">eBPF NodePort Telemetry and Anomaly Detection Pipeline</text>

  <rect x="50" y="90" width="660" height="300" class="gray"/>
  <text x="70" y="118" class="section">Per-node runtime</text>

  <rect x="80" y="150" width="130" height="62" class="blue"/>
  <text x="145" y="176" text-anchor="middle" class="label">Client traffic</text>
  <text x="145" y="196" text-anchor="middle" class="small">NodePort TCP</text>

  <rect x="250" y="138" width="160" height="86" class="green"/>
  <text x="330" y="166" text-anchor="middle" class="label">tc eBPF datapath</text>
  <text x="330" y="187" text-anchor="middle" class="small">rewrite / CT / SNAT</text>
  <text x="330" y="206" text-anchor="middle" class="small">stats counters</text>

  <rect x="455" y="115" width="190" height="70" class="amber"/>
  <text x="550" y="143" text-anchor="middle" class="label">Pinned BPF maps</text>
  <text x="550" y="164" text-anchor="middle" class="small">service, backend, CT</text>

  <rect x="455" y="220" width="190" height="78" class="violet"/>
  <text x="550" y="248" text-anchor="middle" class="label">nodeport-syncer</text>
  <text x="550" y="269" text-anchor="middle" class="small">Service / EndpointSlice</text>
  <text x="550" y="288" text-anchor="middle" class="small">Node watch + reconcile</text>

  <rect x="250" y="282" width="160" height="70" class="amber"/>
  <text x="330" y="310" text-anchor="middle" class="label">Telemetry collector</text>
  <text x="330" y="331" text-anchor="middle" class="small">1s windows to CSV</text>

  <rect x="80" y="275" width="130" height="78" class="blue"/>
  <text x="145" y="303" text-anchor="middle" class="label">Target backend</text>
  <text x="145" y="324" text-anchor="middle" class="small">local or remote</text>
  <text x="145" y="343" text-anchor="middle" class="small">ETP=Cluster</text>

  <line x1="210" y1="181" x2="250" y2="181" class="line"/>
  <line x1="410" y1="181" x2="455" y2="156" class="line"/>
  <line x1="250" y1="317" x2="210" y2="317" class="line"/>
  <line x1="330" y1="224" x2="330" y2="282" class="line"/>
  <line x1="455" y1="256" x2="410" y2="200" class="line"/>
  <line x1="550" y1="220" x2="550" y2="185" class="line"/>
  <line x1="455" y1="150" x2="410" y2="150" class="line dash"/>

  <rect x="760" y="90" width="270" height="300" class="gray"/>
  <text x="780" y="118" class="section">Offline dataset and models</text>

  <rect x="805" y="145" width="180" height="62" class="amber"/>
  <text x="895" y="172" text-anchor="middle" class="label">events.jsonl</text>
  <text x="895" y="192" text-anchor="middle" class="small">fault labels + tail</text>

  <rect x="805" y="235" width="180" height="70" class="green"/>
  <text x="895" y="263" text-anchor="middle" class="label">Window dataset</text>
  <text x="895" y="284" text-anchor="middle" class="small">features without leaks</text>

  <rect x="805" y="335" width="180" height="62" class="violet"/>
  <text x="895" y="362" text-anchor="middle" class="label">Baseline models</text>
  <text x="895" y="382" text-anchor="middle" class="small">RF / LR / rules</text>

  <rect x="150" y="450" width="780" height="115" class="gray"/>
  <text x="170" y="480" class="section">Paper evaluation assets</text>
  <text x="190" y="512" class="label">Phase 4: detection effectiveness</text>
  <text x="430" y="512" class="label">Phase 5: telemetry overhead</text>
  <text x="660" y="512" class="label">Phase 6: generalization + ablation</text>
  <text x="540" y="545" text-anchor="middle" class="small">All local/remote backend experiments use externalTrafficPolicy=Cluster.</text>

  <line x1="410" y1="317" x2="805" y2="270" class="line"/>
  <line x1="895" y1="207" x2="895" y2="235" class="line"/>
  <line x1="895" y1="305" x2="895" y2="335" class="line"/>
  <line x1="895" y1="397" x2="895" y2="450" class="line"/>
  <line x1="330" y1="352" x2="330" y2="450" class="line"/>
  <line x1="550" y1="298" x2="805" y2="176" class="line dash"/>
</svg>
